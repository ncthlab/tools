<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>築盆手冊 - QR Code 掃描比對</title>
  <!-- 引入輕量 QR Code 解析庫 -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background-color: #f2f4f7;
      color: #333;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 480px; /* 手機最適寬度 */
      background: #ffffff;
      padding: 20px 16px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      color: #1a365d;
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      color: #ffffff;
      background-color: #2b6cb0;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(43, 108, 176, 0.2);
      transition: all 0.2s ease;
    }

    .btn:active {
      transform: scale(0.98);
      background-color: #2c5282;
    }

    #video-wrapper {
      position: relative;
      width: 100%;
      margin-top: 16px;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 1 / 1; /* 正方形視窗，方便手機瞄準 */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 掃描對焦匡 */
    .scan-region {
      position: absolute;
      width: 70%;
      height: 70%;
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }

    .scan-region::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: #4299e1;
      box-shadow: 0 0 8px #4299e1;
      animation: scan 2s infinite linear;
    }

    @keyframes scan {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }

    #result-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      font-size: 1rem;
      line-height: 1.6;
      display: none;
    }

    .success {
      background-color: #f0fff4;
      color: #22543d;
      border: 1px solid #c6f6d5;
    }

    .error {
      background-color: #fff5f5;
      color: #9b2c2c;
      border: 1px solid #fed7d7;
    }

    .loading {
      background-color: #ebf8ff;
      color: #2c5282;
      border: 1px solid #bee3f8;
      text-align: center;
      font-weight: 600;
    }

    .info-item {
      background: #ffffff;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 6px;
      border: 1px solid #e2e8f0;
    }

    .info-label {
      font-size: 0.8rem;
      color: #718096;
      display: block;
    }

    .info-val {
      font-size: 1.05rem;
      font-weight: 700;
      color: #2d3748;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>築盆手冊 - 比對系統</h2>
  
  <button id="action-btn" class="btn" onclick="startCamera()">開啟相機掃描</button>
  
  <div id="video-wrapper" style="display:none;">
    <video id="webcam" autoplay playsinline></video>
    <div class="scan-region"></div>
  </div>
  
  <div id="result-box"></div>
</div>

<script>
  // ⚠️ 請替換為你部署的 GAS 網頁應用程式 URL
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/你的GAS部署ID/exec";

  const video = document.getElementById('webcam');
  const videoWrapper = document.getElementById('video-wrapper');
  const resultBox = document.getElementById('result-box');
  const actionBtn = document.getElementById('action-btn');
  
  let streamRef = null;
  let animationFrameId = null;
  let canvasElement = document.createElement('canvas');
  let canvasCtx = canvasElement.getContext('2d');

  // 1. 啟動鏡頭
  function startCamera() {
    actionBtn.style.display = 'none';
    resultBox.style.display = 'none';
    videoWrapper.style.display = 'flex';

    const constraints = {
      video: { 
        facingMode: "environment", // 後置鏡頭
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    };

    navigator.mediaDevices.getUserMedia(constraints)
      .then(function(stream) {
        streamRef = stream;
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        animationFrameId = requestAnimationFrame(tick);
      })
      .catch(function(err) {
        videoWrapper.style.display = 'none';
        actionBtn.style.display = 'block';
        actionBtn.innerText = '重試開啟相機';
        resultBox.style.display = 'block';
        resultBox.className = 'error';
        resultBox.innerHTML = "⚠️ 無法喚醒鏡頭，請確認瀏覽器權限。<br><small>" + err.message + "</small>";
      });
  }

  // 2. 影像幀即時運算
  function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvasElement.height = video.videoHeight;
      canvasElement.width = video.videoWidth;
      
      canvasCtx.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
      const imageData = canvasCtx.getImageData(0, 0, canvasElement.width, canvasElement.height);
      
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: "dontInvert",
      });
      
      if (code && code.data.trim() !== "") {
        stopCamera();
        handleScannedValue(code.data);
        return;
      }
    }
    
    if (streamRef) {
      animationFrameId = requestAnimationFrame(tick);
    }
  }

  // 3. 關閉相機
  function stopCamera() {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    if (streamRef) {
      streamRef.getTracks().forEach(track => track.stop());
    }
    streamRef = null;
    video.srcObject = null;
    videoWrapper.style.display = 'none';
    actionBtn.style.display = 'block';
    actionBtn.innerText = '再次掃描';
  }

  // 4. API 異步查詢 (代替原本的 google.script.run)
  function handleScannedValue(scannedText) {
    resultBox.style.display = 'block';
    resultBox.className = 'loading';
    resultBox.innerHTML = `⏳ 比對雲端資料中...<br><small style="font-weight:normal;">條碼: ${scannedText}</small>`;

    const formData = new URLSearchParams();
    formData.append('scannedText', scannedText);

    fetch(GAS_WEB_APP_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
      },
      body: formData.toString()
    })
    .then(response => {
      if (!response.ok) throw new Error("伺服器回應異常");
      return response.json();
    })
    .then(data => {
      if (data.status === 'success' || data.success) {
        resultBox.className = 'success';
        resultBox.innerHTML = `
          <div style="font-weight:bold; margin-bottom:8px;">✅ 查詢成功</div>
          <div class="info-item"><span class="info-label">【B欄資訊】</span><span class="info-val">${data.bValue || '-'}</span></div>
          <div class="info-item"><span class="info-label">【A欄資訊】</span><span class="info-val">${data.aValue || '-'}</span></div>
          <div class="info-item"><span class="info-label">【C欄資訊】</span><span class="info-val">${data.cValue || '-'}</span></div>
        `;
      } else {
        resultBox.className = 'error';
        resultBox.innerHTML = "❌ 比對失敗：" + (data.message || "找不到匹配資料");
      }
    })
    .catch(error => {
      resultBox.className = 'error';
      resultBox.innerHTML = "⚠️ 系統連線錯誤：" + error.message;
    });
  }
</script>

</body>
</html>
